# Docker Compose Configuration for Vacation Website Project
# This file orchestrates all services needed for the application

services:
  # MySQL Database Service
  mysql:
    # Use official MySQL image, version 8.0
    image: mysql:8.0
    
    # Name for the container
    container_name: vacation_db
    
    # Environment variables for MySQL setup
    environment:
      # Root password - change this in production!
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      # Database name that will be created automatically
      MYSQL_DATABASE: ${DB_NAME:-vacation_db}
      # User for the database
      MYSQL_USER: ${DB_USER:-vacation_user}
      # User password
      MYSQL_PASSWORD: ${DB_PASSWORD:-userpassword}
    
    # Port mapping: HOST:CONTAINER (3306 is MySQL default port)
    ports:
      - "${DB_PORT:-3306}:3306"
    
    # Data persistence and initialization
    volumes:
      # MySQL data persistence - data survives container restarts
      - mysql_data:/var/lib/mysql
      # Initialize database with our SQL schema file
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    
    # Note: Health checks can be unreliable in Docker; services should retry connections
    # Health check to verify MySQL is ready (via TCP instead of socket)
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      timeout: 5s
      retries: 20
      interval: 3s
      start_period: 40s
    
    # Restart policy
    restart: unless-stopped

  # Backend API Service
  backend:
    build:
      context: ./backend
    container_name: vacation_backend
    environment:
      DB_HOST: mysql
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      DB_NAME: ${DB_NAME:-vacation_db}
      DB_USER: ${DB_USER:-vacation_user}
      DB_PASSWORD: ${DB_PASSWORD:-userpassword}
      DB_PORT: 3306
      API_PORT: 5000
      MCP_URL: http://mcp:3005/mcp
      NODE_ENV: production
    ports:
      - "${API_PORT:-5000}:5000"
    depends_on:
      mysql:
        condition: service_started
    restart: unless-stopped

  # MCP Service
  mcp:
    build:
      context: ./backend/mcp
    container_name: vacation_mcp
    environment:
      DB_HOST: mysql
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      DB_NAME: ${DB_NAME:-vacation_db}
      DB_USER: ${DB_USER:-vacation_user}
      DB_PASSWORD: ${DB_PASSWORD:-userpassword}
      DB_PORT: 3306
    ports:
      - "3005:3005"
    depends_on:
      mysql:
        condition: service_started
      backend:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: vacation_frontend
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

# Named volumes - persists data on your computer
volumes:
  mysql_data:
    driver: local

# Custom network for inter-container communication
networks:
  default:
    name: vacation_network
